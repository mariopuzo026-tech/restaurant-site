<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            animation: backgroundAnimation 10s ease infinite;
        }
        @keyframes backgroundAnimation {
            0% { background: linear-gradient(to right, #ff7e5f, #feb47b); }
            50% { background: linear-gradient(to right, #feb47b, #ff7e5f); }
            100% { background: linear-gradient(to right, #ff7e5f, #feb47b); }
        }
        h1 {
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        p {
            color: white;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div>
        <h1>ჩვენი რესტორნის მისასალმებელი გვერდი</h1>
        <p>კეთილი იყოს თქვენი მობრძანება ჩვენს ონლაინ მენიუში!</p>
    </div>
</body>
</html>
